<svg width="1100" height="330" viewBox="0 0 1100 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Capability grid</title>
  <desc id="desc">Four capability cards for Agent Engineering, RAG Systems, Backend Automation and GIS Visualization.</desc>
  <rect width="1100" height="330" fill="#ffffff"/>
  <g transform="translate(10 10)">
    <rect width="520" height="140" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="54" cy="70" r="28" fill="#ffffff" stroke="#fdba74"/>
    <path d="M42 70h24M54 58v24" stroke="#b45309" stroke-width="5" stroke-linecap="round"/>
    <text x="102" y="58" fill="#292524" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="22" font-weight="750">Agent Engineering</text>
    <text x="102" y="88" fill="#57534e" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif" font-size="15">任务拆解 · 工具调用 · 流式状态 · 可观察工作流</text>
  </g>
  <g transform="translate(570 10)">
    <rect width="520" height="140" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
